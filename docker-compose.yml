services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: thalamus
      POSTGRES_PASSWORD: thalamus
      POSTGRES_DB: thalamus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thalamus -d thalamus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: valkey/valkey:9.1-alpine
    volumes:
      - valkey_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  thalamus:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://thalamus:thalamus@postgres:5432/thalamus
      REDIS_URL: redis://redis:6379
      RUST_LOG: info,thalamus=debug
    volumes:
      - ./config.k:/app/config/config.k:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  valkey_data:
