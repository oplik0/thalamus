services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${USER:-thalamus}
      POSTGRES_PASSWORD: ${USER:-thalamus}
      POSTGRES_DB: thalamus
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER:-thalamus} -d thalamus"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:9.1-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  valkey_data:
