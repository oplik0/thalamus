name: Container

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
      - "v[0-9]+*"

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.head_branch == 'main' ||
       startsWith(github.event.workflow_run.head_branch, 'v') ||
       startsWith(github.ref, 'refs/tags/v'))
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v5

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', 'flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 2G

      - uses: cachix/cachix-action@v16
        with:
          name: devenv

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: Build devenv shell
        run: devenv shell -- echo "Shell built successfully"

      - name: Build container
        run: devenv container build prod

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Copy container to GitHub Container Registry
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')

          # Parse tags from metadata action JSON output and push each one
          echo '${{ steps.meta.outputs.json }}' | jq -r '.tags[]' | while read -r tag; do
            echo "Pushing tag: ${tag}"

            devenv container \
              --registry "docker://ghcr.io/" \
              --copy-args="--dest-creds=${{ github.actor }}:${{ secrets.GITHUB_TOKEN }} --additional-tag=${tag}" \
              copy prod
          done

      - name: Output image information
        run: |
          echo "✅ Container pushed successfully!"
          echo ""
          echo "Image tags:"
          echo "${{ steps.meta.outputs.tags }}"
